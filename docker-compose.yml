services:
  app:
    build: .
    container_name: ${COMPOSE_PROJECT_NAME:-minimal-template}-app
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.routers.${COMPOSE_PROJECT_NAME:-minimal-template}.rule=Host(`${PRODUCTION_URL}`)
      - traefik.http.routers.${COMPOSE_PROJECT_NAME:-minimal-template}.tls=true
      - traefik.http.routers.${COMPOSE_PROJECT_NAME:-minimal-template}.entrypoints=web,websecure
      - traefik.http.routers.${COMPOSE_PROJECT_NAME:-minimal-template}.tls.certresolver=mytlschallenge
      - traefik.http.services.${COMPOSE_PROJECT_NAME:-minimal-template}.loadbalancer.server.port=80
    networks:
      - traefik

networks:
  traefik:
    external: true
    name: ${TRAEFIK_NETWORK:-web}
