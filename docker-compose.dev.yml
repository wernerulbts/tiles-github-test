services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: ${COMPOSE_PROJECT_NAME:-minimal-template}-app-dev
    command: npm run dev
    volumes:
      - ./src:/app/src
      - ./index.html:/app/index.html
    labels:
      - traefik.http.routers.${COMPOSE_PROJECT_NAME:-minimal-template}.rule=Host(`${DEVELOPMENT_URL}`)
      - traefik.http.services.${COMPOSE_PROJECT_NAME:-minimal-template}.loadbalancer.server.port=5173
